<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Plan de Acción</title>
<style>
/* ── Variables ───────────────────────────────────────────── */
:root {
  --bg:       #0b0f19;
  --surface:  #131929;
  --card:     #1a2236;
  --card-h:   #1e293b;
  --border:   #243047;
  --border-l: #2d3c54;
  --text:     #e2e8f0;
  --muted:    #7a8aa0;
  --active:   #3b82f6;
  --done:     #22c55e;
  --crit:     #ef4444;
  --high:     #f97316;
  --med:      #eab308;
  --low:      #6b7280;
  --blocked:  #f59e0b;
  --radius:   10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2d3c54;border-radius:3px}

/* ── Header ──────────────────────────────────────────────── */
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:12px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.logo{font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:8px;letter-spacing:.02em}
.logo-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.hdr-actions{display:flex;gap:8px;align-items:center}
.sync-info{font-size:.72rem;color:var(--muted)}

/* ── Buttons ──────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:5px;padding:6px 14px;
  border-radius:7px;border:1px solid var(--border-l);background:var(--card);
  color:var(--text);font-size:.82rem;font-weight:500;transition:all .15s;white-space:nowrap;
}
.btn:hover{background:var(--card-h);border-color:#3d4f6b}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-icon{padding:6px 10px}
.btn-primary{background:var(--active);border-color:var(--active);color:#fff}
.btn-primary:hover{background:#2563eb;border-color:#2563eb}
.btn-purple{background:#7c3aed;border-color:#7c3aed;color:#fff}
.btn-purple:hover{background:#6d28d9}
.btn-ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--card);color:var(--text)}
.btn-danger{background:#450a0a;border-color:#7f1d1d;color:#fca5a5}
.btn-danger:hover{background:#7f1d1d}
.btn-sm{padding:4px 10px;font-size:.78rem}
.btn-xs{padding:3px 8px;font-size:.72rem}


/* ── Tab bar ──────────────────────────────────────────────── */
.tabs-wrap{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 20px;display:flex;align-items:flex-end;gap:2px;overflow-x:auto;
}
.tabs-wrap::-webkit-scrollbar{height:0}
.tab{
  display:flex;align-items:center;gap:7px;padding:11px 16px 10px;
  font-size:.83rem;font-weight:600;color:var(--muted);background:transparent;
  border:none;border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap;
  letter-spacing:.02em;position:relative;text-transform:uppercase;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--active)}
.tab .tab-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tab-divider{width:1px;background:var(--border);height:22px;align-self:center;margin:0 6px;flex-shrink:0}
.tab-add{color:var(--muted);font-size:.85rem;font-weight:700;padding:11px 12px 10px}
.tab-add:hover{color:var(--active)}

/* ── Project bar ──────────────────────────────────────────── */
.project-bar{
  padding:12px 24px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);background:var(--surface);gap:12px;
}
.project-title{font-size:1.2rem;font-weight:800;letter-spacing:.03em}
.project-actions{display:flex;gap:8px;align-items:center}

/* ── Stats ────────────────────────────────────────────────── */
.stats-bar{
  display:flex;gap:8px;padding:8px 24px;
  background:var(--bg);border-bottom:1px solid var(--border);
  font-size:.75rem;overflow-x:auto;
}
.stat{display:flex;align-items:center;gap:5px;color:var(--muted);white-space:nowrap}
.stat strong{color:var(--text);font-size:.85rem}
.stat-blocked strong{color:var(--blocked)}
.stat-done   strong{color:var(--done)}
.stat-btn{
  background:transparent;border:1px solid transparent;border-radius:7px;
  padding:3px 10px;cursor:pointer;font-family:inherit;color:inherit;
  transition:all .15s;outline:none;
}
.stat-btn:hover{background:var(--card);border-color:var(--border-l)}
.stat-btn.sf-active{background:var(--card);border-color:var(--active)}
.stat-btn.sf-active.stat-blocked{border-color:var(--blocked)}
.stat-btn.sf-active.stat-done{border-color:var(--done)}

/* ── Search ───────────────────────────────────────────────── */
.search-wrap{padding:14px 24px 0}
.search-input{
  width:100%;max-width:500px;padding:8px 14px;border-radius:8px;
  background:var(--card);border:1px solid var(--border-l);color:var(--text);
  font-size:.85rem;outline:none;transition:border-color .15s;
}
.search-input:focus{border-color:var(--active)}
.search-input::placeholder{color:var(--muted)}

/* ── Content area ─────────────────────────────────────────── */
.content{
  padding:14px 24px 120px;
  height:calc(100vh - 122px);
  overflow-y:auto;
}

/* ── Category group ───────────────────────────────────────── */
.cat-group{margin-bottom:20px}
.cat-label{
  font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);padding:4px 0 8px;border-bottom:1px solid var(--border);
  margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;
}
.cat-count{font-weight:400;font-size:.65rem}

/* ── Activity card ────────────────────────────────────────── */
.act-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 14px 10px;margin-bottom:7px;cursor:pointer;
  transition:all .16s;display:flex;gap:12px;align-items:flex-start;
  border-left:3px solid transparent;position:relative;
}
.act-card:hover{background:var(--card-h);border-color:var(--border-l);transform:translateX(2px)}
.act-card.prio-critical{border-left-color:var(--crit)}
.act-card.prio-high    {border-left-color:var(--high)}
.act-card.prio-medium  {border-left-color:var(--med)}
.act-card.prio-low     {border-left-color:var(--low)}
.act-card.blocked-card {background:#1c1a0d;border-color:#3d3000}
.act-card.blocked-card:hover{background:#221f0a}

.act-check{
  width:17px;height:17px;border-radius:4px;border:2px solid var(--border-l);
  flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.act-check:hover{border-color:var(--active)}
.act-check.checked{background:var(--done);border-color:var(--done)}
.act-check.checked::after{content:'✓';color:#fff;font-size:.7rem;font-weight:800}

.act-body{flex:1;min-width:0}
.act-title{font-size:.875rem;line-height:1.4;word-break:break-word;font-weight:500}
.act-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;align-items:center}
.act-footer{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;align-items:center}

/* ── Badges ───────────────────────────────────────────────── */
.badge{
  font-size:.66rem;font-weight:600;padding:2px 7px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;
}
.b-crit  {background:#450a0a;color:#fca5a5;border:1px solid #7f1d1d}
.b-high  {background:#431407;color:#fed7aa;border:1px solid #7c2d12}
.b-med   {background:#422006;color:#fde68a;border:1px solid #78350f}
.b-low   {background:#1f2937;color:#9ca3af;border:1px solid #374151}
.b-done  {background:#052e16;color:#86efac;border:1px solid #14532d}
.b-blocked{background:#451a03;color:#fcd34d;border:1px solid #78350f}
.b-due   {background:#0f2033;color:#7dd3fc;border:1px solid #1e3a5f}
.b-due-soon{background:#431407;color:#fed7aa;border:1px solid #7c2d12}
.b-due-over{background:#450a0a;color:#fca5a5;border:1px solid #7f1d1d}
.b-person{background:#1e1b4b;color:#a5b4fc;border:1px solid #312e81}
.b-time  {background:#0f172a;color:#64748b;border:1px solid #1e293b;font-size:.63rem}
.b-src   {background:#0f172a;color:#475569;border:1px solid #1e293b;max-width:160px;overflow:hidden;text-overflow:ellipsis}

/* ── Blocked banner ───────────────────────────────────────── */
.blocked-banner{
  margin-top:6px;padding:4px 8px;border-radius:6px;
  background:#1c1400;border:1px solid #3d3000;
  font-size:.73rem;color:#fcd34d;display:flex;align-items:flex-start;gap:6px;
}
.blocked-banner-icon{flex-shrink:0;margin-top:1px}

/* ── Completed section ────────────────────────────────────── */
.completed-section{margin-top:24px;border-top:1px solid var(--border);padding-top:12px}
.completed-toggle{
  display:flex;align-items:center;gap:8px;background:none;border:none;
  color:var(--muted);font-size:.78rem;font-weight:600;padding:4px 0;
  cursor:pointer;width:100%;text-align:left;
}
.completed-toggle:hover{color:var(--text)}
.completed-toggle .chevron{transition:transform .2s;font-size:.7rem}
.completed-toggle.open .chevron{transform:rotate(180deg)}
.completed-list{margin-top:8px;display:none}
.completed-list.open{display:block}
.act-card.done-card{opacity:.45;border-left-color:var(--done)}
.act-card.done-card .act-title{text-decoration:line-through;color:var(--muted)}
.act-card.done-card:hover{opacity:.65}

/* ── Modal overlay ────────────────────────────────────────── */
.overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
  align-items:center;justify-content:center;padding:20px;
  animation:fadeOverlay .15s ease;
}
.overlay.open{display:flex}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}

.modal{
  background:var(--surface);border:1px solid var(--border-l);border-radius:14px;
  width:100%;max-width:620px;max-height:88vh;display:flex;flex-direction:column;
  animation:slideModal .2s ease;overflow:hidden;
}
@keyframes slideModal{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.modal-head{
  padding:18px 20px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:12px;
}
.modal-head-body{flex:1}
.modal-head h3{font-size:.95rem;line-height:1.45;font-weight:600}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.2rem;line-height:1;flex-shrink:0;padding:2px 4px}
.modal-close:hover{color:var(--text)}

.modal-body{flex:1;overflow-y:auto;padding:16px 20px}
.modal-section{margin-bottom:16px}
.modal-section-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;display:block}
.modal-desc{font-size:.83rem;line-height:1.65;color:#b0bec9;white-space:pre-wrap;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;max-height:180px;overflow-y:auto}

.form-row{display:flex;gap:10px;flex-wrap:wrap}
.form-field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:140px}
.field-label{font-size:.75rem;color:var(--muted);font-weight:500}
.field-input{
  padding:7px 10px;background:var(--card);border:1px solid var(--border-l);
  border-radius:7px;color:var(--text);font-size:.83rem;outline:none;
}
.field-input:focus{border-color:var(--active)}
.field-input::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer}

/* blocked toggle */
.blocked-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.toggle-wrap{display:flex;align-items:center;gap:8px;cursor:pointer}
.toggle{width:36px;height:20px;border-radius:10px;background:var(--border-l);position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--blocked)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on::after{left:19px}
.blocked-reason{width:100%;margin-top:6px;padding:7px 10px;background:var(--card);border:1px solid #3d3000;border-radius:7px;color:#fcd34d;font-size:.82rem;resize:vertical;min-height:56px;outline:none}
.blocked-reason::placeholder{color:#5a4a1a}

.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}

/* ── Add/Edit small modal ─────────────────────────────────── */
.mini-modal{max-width:460px}

/* ── Panel animation ──────────────────────────────────────── */
@keyframes panelIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.panel-anim{animation:panelIn .22s ease}

/* ── Empty ────────────────────────────────────────────────── */
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:.85rem}
.empty-icon{font-size:2rem;margin-bottom:8px}

/* ── Toast ────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#1e293b;border:1px solid var(--border-l);color:var(--text);
  padding:9px 18px;border-radius:8px;font-size:.82rem;
  opacity:0;pointer-events:none;transition:opacity .25s;z-index:300;white-space:nowrap;
}
#toast.show{opacity:1}

/* ── Terminal ─────────────────────────────────────────────── */
.terminal-wrap{
  position:fixed;bottom:0;left:0;right:0;z-index:40;
  background:#080c14;border-top:2px solid var(--border);
  display:flex;flex-direction:column;height:34px;transition:height .2s ease;
}
.terminal-wrap.open{height:280px}
.terminal-bar{
  display:flex;align-items:center;gap:9px;padding:6px 16px;
  cursor:pointer;-webkit-user-select:none;user-select:none;flex-shrink:0;
}
.term-label{font-size:.75rem;color:var(--muted);flex:1}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.status-dot.running{background:var(--high);animation:blink .8s infinite}
.status-dot.done   {background:var(--done)}
.status-dot.error  {background:var(--crit)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.terminal-output{
  flex:1;overflow-y:auto;padding:8px 16px;
  font-family:'Courier New',monospace;font-size:.74rem;
  color:#9ba8b8;background:#06080f;line-height:1.4;
}
.tline.err{color:#fca5a5}

/* ── Utility / static replacements for inline styles ──────── */
.logo-dot-nioval { background:#3b82f6 }
.logo-dot-supra  { background:#a855f7 }
.logo-sep { color:var(--border); margin:0 2px }
.logo-sub { color:var(--muted); font-weight:400; font-size:.85rem; margin-left:6px }
.modal-meta { margin-top:8px }
.blocked-label { font-size:.82rem; color:var(--muted) }
.blocked-reason-hidden { display:none }
.btn-left { margin-right:auto }
.ff-wide { flex:2 }
.textarea-resize { resize:vertical }
.color-input { height:38px; padding:3px 6px }
.term-chev { font-size:.65rem; color:var(--muted) }
.hidden { display:none }
.b-count { font-size:.6rem; padding:1px 5px }
/* dynamic project dot color set via JS data-color → CSS var */
.tab-dot[data-color] { background: var(--dot-color, #6b7280) }
/* ── Progress / Verify Avances modal ─────────────────────── */
.prog-modal{max-width:740px}
.prog-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.prog-stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;text-align:center;flex:1;min-width:72px}
.prog-stat-val{font-size:1.4rem;font-weight:800;display:block}
.prog-stat-lbl{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.prog-stat-done .prog-stat-val{color:var(--done)}
.prog-stat-block .prog-stat-val{color:var(--blocked)}
.prog-stat-rate .prog-stat-val{color:var(--active)}
.prog-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 20px;color:var(--muted);gap:14px;font-size:.84rem}
.spinner{width:26px;height:26px;border:3px solid var(--border-l);border-top-color:var(--active);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.analysis-wrap{font-size:.84rem;line-height:1.75;color:#c5d0dd;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;max-height:450px;overflow-y:auto;white-space:pre-wrap}
.analysis-wrap h2{font-size:.78rem;font-weight:700;color:var(--active);margin:14px 0 5px;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);padding-bottom:4px}
.analysis-wrap h2:first-child{margin-top:0}
.analysis-error{color:#fca5a5;background:#450a0a;border:1px solid #7f1d1d;border-radius:8px;padding:10px 14px;font-size:.83rem}
.btn-teal{background:#0d9488;border-color:#0d9488;color:#fff}
.btn-teal:hover{background:#0f766e;border-color:#0f766e}

/* ── Responsive ───────────────────────────────────────────── */
@media(max-width:640px){
  .content{padding:10px 12px 120px}
  header,.project-bar,.stats-bar,.search-wrap{padding-left:14px;padding-right:14px}
}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="logo">
    <span class="logo-dot logo-dot-nioval"></span>NIOVAL
    <span class="logo-sep">·</span>
    <span class="logo-dot logo-dot-supra"></span>SUPRATECH
    <span class="logo-sub">— Plan de Acción</span>
  </div>
  <div class="hdr-actions">
    <button type="button" class="btn btn-sm" id="btnSync">↻ Sincronizar</button>
    <span class="sync-info" id="syncInfo"></span>
  </div>
</header>

<!-- ── TABS ── -->
<div class="tabs-wrap" id="tabsWrap">
  <!-- populated by JS -->
</div>

<!-- ── PROJECT BAR ── -->
<div class="project-bar" id="projectBar">
  <div class="project-title" id="projectTitle">—</div>
  <div class="project-actions" id="projectActions"></div>
</div>

<!-- ── STATS ── -->
<div class="stats-bar" id="statsBar"></div>

<!-- ── SEARCH ── -->
<div class="search-wrap">
  <input type="search" class="search-input" id="searchInput" placeholder="Buscar actividades…">
</div>

<!-- ── CONTENT ── -->
<div class="content" id="content"></div>

<!-- ── TASK DETAIL MODAL ── -->
<div class="overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div class="act-check" id="mCheck"></div>
      <div class="modal-head-body">
        <h3 id="mTitle"></h3>
        <div class="act-row modal-meta" id="mMeta"></div>
      </div>
      <button type="button" class="modal-close" id="mClose">✕</button>
    </div>
    <div class="modal-body">

      <!-- Description -->
      <div class="modal-section" id="mDescSection">
        <span class="modal-section-label">Descripción / Contexto</span>
        <div class="modal-desc" id="mDesc"></div>
      </div>

      <!-- Dates + Assignees + Time -->
      <div class="modal-section">
        <div class="form-row">
          <div class="form-field">
            <label class="field-label" for="mDue">📅 Fecha límite</label>
            <input type="date" class="field-input" id="mDue">
          </div>
          <div class="form-field">
            <label class="field-label" for="mAssignees">👤 Personas asignadas</label>
            <input type="text" class="field-input" id="mAssignees" placeholder="Carlos, Ana…">
          </div>
        </div>
      </div>

      <div class="modal-section">
        <div class="form-row">
          <div class="form-field">
            <label class="field-label" for="mEstTime">⏱ Tiempo estimado</label>
            <input type="text" class="field-input" id="mEstTime" placeholder="ej. 2h, 3 días">
          </div>
          <div class="form-field">
            <label class="field-label" for="mSpentTime">⏱ Tiempo real / transcurrido</label>
            <input type="text" class="field-input" id="mSpentTime" placeholder="ej. 1.5h">
          </div>
        </div>
      </div>

      <!-- Blocked -->
      <div class="modal-section">
        <span class="modal-section-label">🚧 Retenida / bloqueada</span>
        <div class="blocked-row">
          <label class="toggle-wrap" id="blockedToggle">
            <div class="toggle" id="blockedSwitch"></div>
            <span class="blocked-label" id="blockedLabel">Sin bloqueo</span>
          </label>
        </div>
        <textarea class="blocked-reason blocked-reason-hidden" id="blockedReason" placeholder="Describe el bloqueo externo…"></textarea>
      </div>

    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-sm btn-danger btn-left" id="mDelete">🗑 Eliminar</button>
      <button type="button" class="btn btn-sm" id="mSave">Guardar cambios</button>
      <button type="button" class="btn btn-sm" id="mToggleDone">Marcar realizada</button>
      <button type="button" class="btn btn-sm btn-ghost" id="mCloseBtn">Cerrar</button>
    </div>
  </div>
</div>

<!-- ── ADD TASK MODAL ── -->
<div class="overlay" id="addTaskOverlay">
  <div class="modal mini-modal">

<script>
// ── State ─────────────────────────────────────────────────────
let activities = [];
let projects   = [];
let activeId   = 'nioval';
let searchQ    = '';
let activeModalId = null;
let completedOpen = {};   // { projectId: bool }
let activeFilter  = null; // null | 'pending' | 'blocked' | 'done'

// ── API ───────────────────────────────────────────────────────
const api = async (method, url, body) => {
  const r = await fetch(url, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  return r.json();
};

// ── Init ──────────────────────────────────────────────────────
async function init() {
  [projects, activities] = await Promise.all([
    api('GET', '/api/projects'),
    api('GET', '/api/activities'),
  ]);
  renderTabs();
  renderProject(activeId);
}

// ── Tabs ──────────────────────────────────────────────────────
function renderTabs() {
  const wrap = document.getElementById('tabsWrap');
  const main    = projects.filter(p => p.type === 'main');
  const diverse = projects.filter(p => p.type !== 'main');

  let html = main.map(p => tabHTML(p)).join('');
  if (diverse.length) {
    html += `<div class="tab-divider"></div>`;
    html += diverse.map(p => tabHTML(p, true)).join('');
  }
  html += `<div class="tab-divider"></div>
  <button type="button" class="tab tab-add" id="tabAddProj" title="Agregar proyecto">＋</button>`;
  wrap.innerHTML = html;

  wrap.querySelectorAll('.tab[data-id]').forEach(t => {
    t.addEventListener('click', () => switchProject(t.dataset.id));
  });
  document.getElementById('tabAddProj').addEventListener('click', openAddProj);
  updateActiveTab();
}

function tabHTML(p, isDiverse) {
  const scripts = p.type === 'main' ? scriptList(p.id) : [];
  const pending = activities.filter(a => a.company === p.id && !a.completed).length;
  return `<button type="button" class="tab${activeId===p.id?' active':''}" data-id="${p.id}">
    <span class="tab-dot" style="background:${esc(p.color)}"></span>
    ${esc(p.name)}
    ${pending ? `<span class="badge b-src b-count">${pending}</span>` : ''}
  </button>`;
}

function scriptList(id) {
  if (id === 'nioval') return ['nioval_analista_marketing.py','nioval_analista_ventas.py'];
  if (id === 'supratech') return ['supratech_analista.py'];
  if (id === 'fiverr') return ['fiverr_asesor.py'];
  return [];
}

function updateActiveTab() {
  document.querySelectorAll('.tab[data-id]').forEach(t => {
    t.classList.toggle('active', t.dataset.id === activeId);
    const p = projects.find(p => p.id === t.dataset.id);
    if (p && t.classList.contains('active')) {
      t.style.color = p.color;
      t.style.borderBottomColor = p.color;
    } else {
      t.style.color = '';
      t.style.borderBottomColor = 'transparent';
    }
  });
}

function switchProject(id) {
  if (id === activeId) return;
  activeId = id;
  searchQ = '';
  activeFilter = null;
  document.getElementById('searchInput').value = '';
  updateActiveTab();
  renderProject(id);
}

// ── Project render ────────────────────────────────────────────
function renderProject(id) {
  const p = projects.find(p => p.id === id);
  if (!p) return;

  // Project bar
  document.getElementById('projectTitle').textContent = p.name;
  document.getElementById('projectTitle').style.color = p.color;

  const actions = document.getElementById('projectActions');
  const scripts = scriptList(id);
  let aHtml = '';
  if (scripts.length) {
    aHtml += scripts.map(s => {
      const label = s.includes('marketing') ? '▶ Marketing'
                  : s.includes('ventas')    ? '▶ Ventas'
                  : s.includes('fiverr')    ? '▶ Asesor Fiverr'
                  : '▶ Analista';
      return `<button type="button" class="btn btn-sm btn-primary" data-script="${esc(s)}">${label}</button>`;
    }).join('');
    aHtml += `<button type="button" class="btn btn-sm" id="btnViewReport" style="background:#1dbf73;border-color:#1dbf73;color:#fff">📄 Ver Reporte</button>`;
    aHtml += `<button type="button" class="btn btn-sm btn-teal" id="btnVerify">🔍 Verificar Avances</button>`;
  }
  if (p.type === 'diverse') {
    aHtml += `<button type="button" class="btn btn-sm btn-purple" id="btnAnalyzeProj">▶ Analizar viabilidad</button>`;
    aHtml += `<button type="button" class="btn btn-sm btn-primary" id="btnAddTask">＋ Nueva tarea</button>`;
    aHtml += `<button type="button" class="btn btn-sm btn-danger" id="btnDelProj" title="Eliminar proyecto">🗑</button>`;
  }
  actions.innerHTML = aHtml;

  actions.querySelectorAll('[data-script]').forEach(b => b.addEventListener('click', () => runScript(b.dataset.script)));
  document.getElementById('btnViewReport')?.addEventListener('click', () => openReportModal(id));
  document.getElementById('btnVerify')?.addEventListener('click', () => openProgressModal(id));
  document.getElementById('btnAnalyzeProj')?.addEventListener('click', () => runScript('analista_proyectos_anexos.py', [id]));
  document.getElementById('btnAddTask')?.addEventListener('click', openAddTask);
  document.getElementById('btnDelProj')?.addEventListener('click', deleteProject);

  renderStats(id);
  renderContent(id);
}

function renderStats(id) {
  const list = activities.filter(a => a.company === id);
  const done    = list.filter(a => a.completed).length;
  const blocked = list.filter(a => a.blocked && !a.completed).length;
  const pending = list.filter(a => !a.completed).length;
  const af = activeFilter;
  const ac = (f) => f === af ? ' sf-active' : '';

  document.getElementById('statsBar').innerHTML = `
    <button class="stat stat-btn${!af?' sf-active':''}" data-f="">
      <span>Total</span><strong>${list.length}</strong>
    </button>
    <button class="stat stat-btn${ac('pending')}" data-f="pending">
      <span>Pendientes</span><strong>${pending}</strong>
    </button>
    <button class="stat stat-btn stat-blocked${ac('blocked')}" data-f="blocked">
      <span>🚧 Bloqueadas</span><strong>${blocked}</strong>
    </button>
    <button class="stat stat-btn stat-done${ac('done')}" data-f="done">
      <span>✓ Completadas</span><strong>${done}</strong>
    </button>`;

  document.querySelectorAll('#statsBar .stat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const f = btn.dataset.f || null;
      activeFilter = (f === null || activeFilter === f) ? null : f;
      renderStats(id);
      renderContent(id);
    });
  });
}

// ── Content render ────────────────────────────────────────────
function renderContent(id) {
  const content = document.getElementById('content');
  const q = searchQ.toLowerCase();
  const all = activities
    .filter(a => a.company === id)
    .filter(a => !q || a.title.toLowerCase().includes(q) || (a.category||'').toLowerCase().includes(q) || (a.assignees||'').toLowerCase().includes(q));

  // Apply stat filter
  let mainList, doneList;
  if (activeFilter === 'pending') {
    mainList = all.filter(a => !a.completed && !a.blocked);
    doneList = [];
  } else if (activeFilter === 'blocked') {
    mainList = all.filter(a => a.blocked && !a.completed);
    doneList = [];
  } else if (activeFilter === 'done') {
    mainList = all.filter(a => a.completed);
    doneList = [];
  } else {
    mainList = all.filter(a => !a.completed);
    doneList = all.filter(a => a.completed);
  }

  if (!all.length) {
    content.innerHTML = `<div class="empty panel-anim"><div class="empty-icon">📋</div>Sin actividades${q?' para "'+q+'"':'.'}</div>`;
    return;
  }
  if (!mainList.length && !doneList.length) {
    const labels = { pending:'pendientes', blocked:'bloqueadas', done:'completadas' };
    content.innerHTML = `<div class="empty panel-anim"><div class="empty-icon">📋</div>No hay tareas ${labels[activeFilter]||''}${q?' para "'+q+'"':''}.</div>`;
    return;
  }

  const isDoneView = activeFilter === 'done';
  const groups = groupByCategory(mainList);
  let html = '<div class="panel-anim">';
  for (const [cat, items] of groups) {
    html += `<div class="cat-group">
      <div class="cat-label">${esc(cat)} <span class="cat-count">(${items.length})</span></div>`;
    items.forEach(a => { html += cardHTML(a, isDoneView); });
    html += '</div>';
  }

  // Completed section only when no filter active
  if (doneList.length) {
    const isOpen = completedOpen[id] || false;
    html += `<div class="completed-section">
      <button type="button" class="completed-toggle${isOpen?' open':''}" id="completedBtn">
        <span class="chevron">▼</span>
        Completadas <span class="badge b-done" style="margin-left:4px">${doneList.length}</span>
      </button>
      <div class="completed-list${isOpen?' open':''}" id="completedList">`;
    doneList.forEach(a => { html += cardHTML(a, true); });
    html += '</div></div>';
  }

  html += '</div>';
  content.innerHTML = html;

  // Bind events
  content.querySelectorAll('.act-check').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); toggleDone(el.dataset.id); });
  });
  content.querySelectorAll('.act-card').forEach(el => {
    el.addEventListener('click', () => openModal(el.dataset.id));
  });
  document.getElementById('completedBtn')?.addEventListener('click', () => {
    completedOpen[id] = !completedOpen[id];
    renderContent(id);
  });
}

// ── Category ordering ─────────────────────────────────────────
function catOrder(c) {
  const u = c.toUpperCase();
  if (/QUICK[\s-]*WIN/.test(u))                              return 0;
  if (/SEMANA\s*1[-–]?2/.test(u))                            return 1;
  if (/SEMANA\s*[23]/.test(u))                               return 2;
  if (/MES\s*1/.test(u))                                     return 3;
  if (/MES\s*[2-6]/.test(u))                                 return 4;
  if (/PLAN\s*DE\s*ACCI[OÓ]N/.test(u))                       return 5;
  if (/PLAN\s*DE\s*IMPLEMENTACI[OÓ]N\s*DE\s*MARKETING/.test(u)) return 6;
  if (/PLAN\s*DE\s*IMPLEMENTACI[OÓ]N/.test(u))               return 7;
  if (/PLAN\s*MAESTRO/.test(u))                              return 8;
  if (/OPORTUNIDAD/.test(u))                                 return 9;
  return 10;
}

function groupByCategory(list) {
  const map = new Map();
  for (const a of list) {
    const cat = a.category || 'General';
    if (!map.has(cat)) map.set(cat, []);
    map.get(cat).push(a);
  }
  for (const arr of map.values()) {
    arr.sort((a, b) => {
      if (a.blocked !== b.blocked) return a.blocked ? -1 : 1; // blocked first
      const pa = { critical:0, high:1, medium:2, low:3 };
      return (pa[a.priority]??2) - (pa[b.priority]??2);
    });
  }
  return new Map([...map.entries()].sort((a,b) => catOrder(a[0]) - catOrder(b[0])));
}

// ── Card HTML ─────────────────────────────────────────────────
function cardHTML(a, isDone) {
  const pClass = `prio-${a.priority||'medium'}`;
  const blockCls = a.blocked && !isDone ? ' blocked-card' : '';
  const doneCls  = isDone ? ' done-card' : '';
  const due = dueBadge(a.dueDate);

  let footer = '';
  if (a.assignees) footer += `<span class="badge b-person">👤 ${esc(a.assignees)}</span>`;
  if (a.estimatedTime || a.timeSpent) {
    const t = [a.estimatedTime && `Est: ${a.estimatedTime}`, a.timeSpent && `Real: ${a.timeSpent}`].filter(Boolean).join(' · ');
    footer += `<span class="badge b-time">⏱ ${esc(t)}</span>`;
  }

  let blockedBanner = '';
  if (a.blocked && !isDone) {
    blockedBanner = `<div class="blocked-banner"><span class="blocked-banner-icon">🚧</span><span>${esc(a.blockedReason||'En espera de resolución externa')}</span></div>`;
  }

  return `<div class="act-card ${pClass}${blockCls}${doneCls}" data-id="${a.id}">
    <div class="act-check${isDone?' checked':''}" data-id="${a.id}"></div>
    <div class="act-body">
      <div class="act-title">${esc(a.title)}</div>
      <div class="act-row">
        ${priBadge(a.priority)}
        ${due}
        ${a.blocked && !isDone ? '<span class="badge b-blocked">🚧 Bloqueada</span>' : ''}
      </div>
      ${footer ? `<div class="act-footer">${footer}</div>` : ''}
      ${blockedBanner}
    </div>
  </div>`;
}

function priBadge(p) {
  const M = { critical:['b-crit','🔴 Crítico'], high:['b-high','🟠 Alto'], medium:['b-med','🟡 Medio'], low:['b-low','⚪ Bajo'] };
  const [cls,lbl] = M[p]||M.medium;
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function dueBadge(d) {
  if (!d) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const due   = new Date(d+'T00:00:00');
  const diff  = Math.round((due-today)/86400000);
  if (diff < 0)    return `<span class="badge b-due-over">⚠ Vencida ${Math.abs(diff)}d</span>`;
  if (diff === 0)  return `<span class="badge b-due-soon">⏰ Hoy</span>`;
  if (diff === 1)  return `<span class="badge b-due-soon">⏰ Mañana</span>`;
  if (diff <= 4)   return `<span class="badge b-due-soon">⏰ En ${diff}d</span>`;
  return `<span class="badge b-due">📅 ${due.toLocaleDateString('es-MX',{day:'2-digit',month:'short'})}</span>`;
}

// ── Toggle done ───────────────────────────────────────────────
async function toggleDone(id) {
  const a = activities.find(x => x.id === id);
  if (!a) return;
  const updated = await api('PATCH', `/api/activities/${id}`, { completed: !a.completed });
  Object.assign(a, updated);
  renderStats(activeId);
  renderContent(activeId);
  renderTabs();
  if (activeModalId === id) populateModal(a);
}

// ── Task modal ────────────────────────────────────────────────
function openModal(id) {
  const a = activities.find(x => x.id === id);
  if (!a) return;
  activeModalId = id;
  populateModal(a);
  document.getElementById('modalOverlay').classList.add('open');
}

function populateModal(a) {
  document.getElementById('mTitle').textContent = a.title;

  const check = document.getElementById('mCheck');
  check.className = 'act-check' + (a.completed ? ' checked' : '');
  check.dataset.id = a.id;

  document.getElementById('mMeta').innerHTML = `
    ${priBadge(a.priority)}
    ${dueBadge(a.dueDate)}
    ${a.blocked ? '<span class="badge b-blocked">🚧 Bloqueada</span>' : ''}
    <span class="badge b-src">${esc(a.source||'manual')}</span>
    <span class="badge b-src">📂 ${esc(a.category||'')}</span>`;

  const desc = document.getElementById('mDesc');
  desc.textContent = a.description || '';
  document.getElementById('mDescSection').classList.toggle('hidden', !a.description);

  document.getElementById('mDue').value        = a.dueDate || '';
  document.getElementById('mAssignees').value  = a.assignees || '';
  document.getElementById('mEstTime').value    = a.estimatedTime || '';
  document.getElementById('mSpentTime').value  = a.timeSpent || '';

  const sw  = document.getElementById('blockedSwitch');
  const lbl = document.getElementById('blockedLabel');
  const ra  = document.getElementById('blockedReason');
  sw.className  = 'toggle' + (a.blocked ? ' on' : '');
  lbl.textContent = a.blocked ? '🚧 Bloqueada / en espera' : 'Sin bloqueo';
  ra.value = a.blockedReason || '';
  ra.classList.toggle('blocked-reason-hidden', !a.blocked);

  document.getElementById('mToggleDone').textContent = a.completed ? 'Marcar pendiente' : 'Marcar realizada';
  const canDelete = a.source === 'manual';
  document.getElementById('mDelete').classList.toggle('hidden', !canDelete);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  activeModalId = null;
}

document.getElementById('mClose').addEventListener('click', closeModal);
document.getElementById('mCloseBtn').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

document.getElementById('mCheck').addEventListener('click', () => {
  if (activeModalId) toggleDone(activeModalId);
});
document.getElementById('mToggleDone').addEventListener('click', () => {
  if (activeModalId) toggleDone(activeModalId);
});

document.getElementById('blockedToggle').addEventListener('click', () => {
  if (!activeModalId) return;
  const a = activities.find(x => x.id === activeModalId);
  if (!a) return;
  const sw = document.getElementById('blockedSwitch');
  const ra = document.getElementById('blockedReason');
  const lbl = document.getElementById('blockedLabel');
  const newVal = !a.blocked;
  a.blocked = newVal;
  sw.className  = 'toggle' + (newVal ? ' on' : '');
  lbl.textContent = newVal ? '🚧 Bloqueada / en espera' : 'Sin bloqueo';
  ra.classList.toggle('blocked-reason-hidden', !newVal);
});

document.getElementById('mSave').addEventListener('click', async () => {
  if (!activeModalId) return;
  const patch = {
    dueDate:       document.getElementById('mDue').value || null,
    assignees:     document.getElementById('mAssignees').value.trim(),
    estimatedTime: document.getElementById('mEstTime').value.trim(),
    timeSpent:     document.getElementById('mSpentTime').value.trim(),
    blocked:       document.getElementById('blockedSwitch').classList.contains('on'),
    blockedReason: document.getElementById('blockedReason').value.trim(),
  };
  const updated = await api('PATCH', `/api/activities/${activeModalId}`, patch);
  const idx = activities.findIndex(a => a.id === activeModalId);
  activities[idx] = updated;
  populateModal(updated);
  renderStats(activeId);
  renderContent(activeId);
  renderTabs();
  toast('✅ Guardado');
});

document.getElementById('mDelete').addEventListener('click', async () => {
  if (!activeModalId) return;
  if (!confirm('¿Eliminar esta tarea?')) return;
  await api('DELETE', `/api/activities/${activeModalId}`);
  activities = activities.filter(a => a.id !== activeModalId);
  closeModal();
  renderStats(activeId);
  renderContent(activeId);
  renderTabs();
  toast('🗑 Tarea eliminada');
});

// ── Add Task ──────────────────────────────────────────────────
function openAddTask() {
  ['atTitle','atCategory','atAssignees','atEstTime','atDesc'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('atDue').value = '';
  document.getElementById('atPriority').value = 'medium';
  document.getElementById('addTaskOverlay').classList.add('open');
}

document.getElementById('atClose').addEventListener('click',  () => document.getElementById('addTaskOverlay').classList.remove('open'));

async function deleteProject() {
  const p = projects.find(x => x.id === activeId);
  if (!p || p.type === 'main') return;
  if (!confirm(`¿Eliminar el proyecto "${p.name}"? Las tareas también se eliminarán.`)) return;
  await api('DELETE', `/api/projects/${activeId}`);
  projects = projects.filter(x => x.id !== activeId);
  activities = activities.filter(a => a.company !== activeId);
  activeId = 'nioval';
  renderTabs();
  renderProject('nioval');
  toast('🗑 Proyecto eliminado');
}

// ── Script Runner ─────────────────────────────────────────────
const termEl  = document.getElementById('terminal');
const termOut = document.getElementById('termOutput');
const termLbl = document.getElementById('termLabel');
const termDot = document.getElementById('termDot');
const termChev = document.getElementById('termChev');

document.getElementById('termToggle').addEventListener('click', () => {
  termEl.classList.toggle('open');
  termChev.textContent = termEl.classList.contains('open') ? '▼' : '▲';
});

function runScript(script, args) {
  termEl.classList.add('open'); termChev.textContent = '▼';
  termOut.innerHTML = '';
  appendTerm(`▶ ${script}${args&&args.length?' ['+args.join(', ')+']':''}`, false);
  termLbl.textContent = script;
  termDot.className = 'status-dot running';

  fetch('/api/run-script', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({script, args: args||[]}) })
    .then(r => r.json())
    .then(({ jobId, error }) => {
      if (error) { appendTerm('ERROR: '+error, true); setTermState('error'); return; }
      const src = new EventSource(`/api/script-output/${jobId}`);
      src.addEventListener('line', e => {
        const { text } = JSON.parse(e.data);
        appendTerm(text, /error|traceback/i.test(text));
      });
      src.addEventListener('done', async e => {
        src.close();
        const { exitCode, newActivities } = JSON.parse(e.data);
        appendTerm(`✔ Terminado (código ${exitCode})`, false);
        setTermState(exitCode === 0 ? 'done' : 'error');
        termLbl.textContent = exitCode === 0 ? '✔ OK' : '✖ Error';
        if (newActivities > 0) {
          activities = await api('GET', '/api/activities');
          renderTabs(); renderProject(activeId);
          toast(`✅ ${newActivities} actividad(es) nuevas`);
        }
      });
      src.addEventListener('error', () => { src.close(); setTermState('error'); });
    });
}

function setTermState(s) { termDot.className = 'status-dot '+s; }
function appendTerm(text, err) {
  const d = document.createElement('div');
  d.className = 'tline' + (err ? ' err' : '');
  d.textContent = text;
  termOut.appendChild(d);
  termOut.scrollTop = termOut.scrollHeight;
}

// ── Toast ─────────────────────────────────────────────────────
let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 3200);
}

// ── Progress Verification Modal ───────────────────────────────
let progCompany = null;

function openProgressModal(company) {
  progCompany = company;
  const p = projects.find(x => x.id === company);
  document.getElementById('progTitle').textContent = `Verificación de Avances — ${p ? p.name : company}`;
  document.getElementById('progStats').innerHTML = '';
  document.getElementById('progBody').innerHTML =
    '<div class="prog-loading"><div class="spinner"></div><span>Analizando avances con IA…</span></div>';
  document.getElementById('progOverlay').classList.add('open');
  fetchProgressAnalysis(company);
}

async function fetchProgressAnalysis(company) {
  try {
    const res = await api('POST', '/api/verify-progress', { company });
    if (res.error) {
      document.getElementById('progBody').innerHTML =
        `<div class="analysis-error">⚠ ${esc(res.error)}</div>`;
      return;
    }
    const s = res.stats;
    document.getElementById('progStats').innerHTML = `
      <div class="prog-stat"><span class="prog-stat-val">${s.total}</span><span class="prog-stat-lbl">Total</span></div>
      <div class="prog-stat prog-stat-done"><span class="prog-stat-val">${s.completed}</span><span class="prog-stat-lbl">Completadas</span></div>
      <div class="prog-stat"><span class="prog-stat-val">${s.pending}</span><span class="prog-stat-lbl">Pendientes</span></div>
      <div class="prog-stat prog-stat-block"><span class="prog-stat-val">${s.blocked}</span><span class="prog-stat-lbl">Bloqueadas</span></div>
      <div class="prog-stat prog-stat-rate"><span class="prog-stat-val">${s.completionRate}%</span><span class="prog-stat-lbl">Avance</span></div>`;
    document.getElementById('progBody').innerHTML =
      `<div class="analysis-wrap">${formatAnalysis(res.analysis)}</div>`;
  } catch (e) {
    document.getElementById('progBody').innerHTML =
      `<div class="analysis-error">⚠ Error de conexión: ${esc(e.message)}</div>`;
  }
}

function formatAnalysis(raw) {
  return raw.split('\n').map(line => {
    if (line.startsWith('## ')) return `<h2>${esc(line.slice(3))}</h2>`;
    if (/^\*\*(.+)\*\*$/.test(line)) return `<strong>${esc(line.slice(2,-2))}</strong>`;
    return esc(line);
  }).join('\n');
}

document.getElementById('progClose').addEventListener('click', () => {
  document.getElementById('progOverlay').classList.remove('open');
});
document.getElementById('progCloseBtn').addEventListener('click', () => {
  document.getElementById('progOverlay').classList.remove('open');
});
document.getElementById('progOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('progOverlay'))
    document.getElementById('progOverlay').classList.remove('open');
});
document.getElementById('progRefresh').addEventListener('click', () => {
  if (!progCompany) return;
  document.getElementById('progStats').innerHTML = '';
  document.getElementById('progBody').innerHTML =
    '<div class="prog-loading"><div class="spinner"></div><span>Re-analizando…</span></div>';
  fetchProgressAnalysis(progCompany);
});

// ── Report Viewer ─────────────────────────────────────────────
async function openReportModal(company) {
  document.getElementById('reportModal').style.display = 'flex';
  const sel = document.getElementById('reportSelect');
  const pre = document.getElementById('reportContent');
  pre.textContent = 'Cargando lista de reportes...';
  sel.innerHTML = '';

  const files = await fetch(`/api/reports/${encodeURIComponent(company)}`).then(r=>r.json()).catch(()=>[]);
  if (!files.length) {
    pre.textContent = 'No hay reportes disponibles. Corre el asesor primero.';
    return;
  }
  sel.innerHTML = files.map(f=>`<option value="${f}">${f}</option>`).join('');

  async function load(f) {
    pre.textContent = 'Cargando...';
    const res = await fetch(`/api/report-content?file=${encodeURIComponent(f)}`).then(r=>r.json()).catch(e=>({error:e.message}));
    pre.textContent = res.error ? 'Error: '+res.error : res.content;
  }
  sel.onchange = () => load(sel.value);
  await load(files[0]);
}

// ── Utils ─────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
